<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logan’s Loft — French Alps</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #1d3c3c;
    background: #f3e5c9;
}

/* HERO */
.hero {
    height: 90vh;
    background: url("images/summer-hero.jpg") center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: white;
}

.hero h1 {
    font-size: 3rem;
    margin: 0;
}

.hero p {
    margin-top: 10px;
    font-size: 1.2rem;
}

/* SECTION */
.section {
    padding: 60px 20px;
    max-width: 1100px;
    margin: auto;
}

.section h2 {
    margin-bottom: 20px;
}

/* GRID */
.grid {
    display: grid;
    gap: 15px;
}

.grid-2 {
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
}

.grid-3 {
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
}

img {
    width: 100%;
    height: auto;
    display: block;
}

/* FOOTER */
.footer {
    background: #1d3c3c;
    color: #f3e5c9;
    text-align: center;
    padding: 30px 20px;
    font-size: 0.9rem;
}
</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div>
        <h1>Logan’s Loft</h1>
        <p>Relaxed & Livin’ presents</p>
    </div>
</section>

<!-- INTRO -->
<section class="section">
    <p>
        A place to live for a bit.<br>
        Not a resort. Not a checklist.<br>
        Just space — to slow down, cook, walk, and figure out the day.
    </p>
</section>

<!-- MOOD -->
<section class="section grid grid-2">
    <img src="images/hero-morillon-sign-from-mountian-top.jpg">
    <img src="images/hero-mountian-scene.jpg">
</section>

<!-- PROPERTY -->
<section class="section">
    <h2>The Space</h2>
    <div class="grid grid-3">
        <img src="images/kitchen.JPG">
        <img src="images/whole-living-room.JPG">
        <img src="images/bedroom-master.jpg">
        <img src="images/bedroom-bunkbeds.jpg">
        <img src="images/bedroom-tripple.JPG">
        <img src="images/master-bath.jpg">
    </div>
</section>

<!-- LOCATION -->
<section class="section">
    <h2>Where it is</h2>
    <img src="images/map-pindrop.jpg">
</section>

<!-- LIFE -->
<section class="section grid grid-3">
    <img src="images/cow.JPG">
    <img src="images/food-1.jpg">
    <img src="images/food-2.JPG">
</section>

<!-- FOOTER -->
<section class="footer">
    <p>Relaxed & Livin’</p>
    <p>Logan’s Loft — Morillon, France</p>
    <p>Registration #: 7419000097735</p>
</section>

</body>
</html>
